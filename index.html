<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Source Sans 3',sans-serif;background:#f2fbf2;min-height:100vh;}
h1,h2,h3{font-family:'Nunito',sans-serif;}
.si{border:1.5px solid #c2e8c2;border-radius:8px;padding:7px 11px;font-size:13px;color:#1a1a18;width:100%;outline:none;transition:border-color .15s;font-family:'Source Sans 3',sans-serif;background:white;}
.si:focus{border-color:#3a9e3a;box-shadow:0 0 0 3px #e0f4e0;}
.sb{background:white;border:1.5px solid #8fd08f;border-radius:8px;padding:6px 14px;font-size:13px;color:#1e4d1e;cursor:pointer;transition:all .15s;font-weight:600;font-family:'Source Sans 3',sans-serif;}
.sb:hover{background:#f2fbf2;border-color:#3a9e3a;}
.sb:active{transform:scale(.98);}
.sbp{background:#2d7a2d;color:white;border-color:#1e4d1e;}
.sbp:hover{background:#1e4d1e;color:white;}
.sbp:disabled{opacity:.5;cursor:default;transform:none;}
.sc{background:white;border:1.5px solid #c2e8c2;border-radius:12px;padding:1rem 1.25rem;}
.pb{height:6px;border-radius:3px;background:#c2e8c2;overflow:hidden;}
.pf{height:100%;border-radius:3px;transition:width .4s ease;}
.tab{padding:8px 16px;font-size:13px;border:none;background:transparent;cursor:pointer;color:#8a8a80;font-weight:600;border-bottom:2.5px solid transparent;transition:all .15s;font-family:'Nunito',sans-serif;}
.tab.on{color:#256325;border-bottom-color:#2d7a2d;}
.crow{background:white;border:1.5px solid #c2e8c2;border-radius:10px;overflow:hidden;transition:border-color .15s;margin-bottom:6px;}
.crow:hover{border-color:#5ab85a;}
.mc{background:#f2fbf2;border:1.5px solid #c2e8c2;border-radius:10px;padding:12px 16px;}
@keyframes fi{from{opacity:0;transform:translateY(5px);}to{opacity:1;transform:translateY(0);}}
.fi{animation:fi .18s ease;}
select.si{cursor:pointer;}
textarea.si{resize:vertical;line-height:1.6;}
</style>
</head>

// ─── HELPERS ─────────────────────────────────────────────────────────
function initProg(){const p={};TODAS.forEach(c=>{p[c.id]={};[1,2,3].forEach(n=>{p[c.id][n]={estado:"Sin iniciar",fecha:"",comentario:""};});});return p;}
function initExp(){const e={};Object.entries(EXPS).forEach(([k,arr])=>{e[k]={};arr.forEach(x=>{e[k][x]={realizada:false,fecha:""};});});return e;}
function initExpViejo(){const e={};Object.entries(EXPS_VIEJO).forEach(([k,arr])=>{e[k]={};arr.forEach(x=>{e[k][x]={realizada:false,fecha:""};});});return e;}
function aplicarNivelacion(p){const r=JSON.parse(JSON.stringify(p));TODAS.forEach(c=>[1,2].forEach(n=>{r[c.id][n]={estado:"Validado",fecha:new Date().toISOString().slice(0,10),comentario:"Validado por nivelación (esquema anterior)"};} ));return r;}
function revertirNivelacion(p){const r=JSON.parse(JSON.stringify(p));TODAS.forEach(c=>[1,2].forEach(n=>{if(r[c.id][n].comentario==="Validado por nivelación (esquema anterior)")r[c.id][n]={estado:"Sin iniciar",fecha:"",comentario:""};} ));return r;}
function pct(prog){let t=0,v=0;TODAS.forEach(c=>[1,2,3].forEach(n=>{t++;if(prog?.[c.id]?.[n]?.estado==="Validado")v++;}));return t?Math.round((v/t)*100):0;}
function nivelOk(prog){const ok=n=>TODAS.every(c=>prog?.[c.id]?.[n]?.estado==="Validado");if(ok(3))return 3;if(ok(2))return 2;if(ok(1))return 1;return 0;}
function pctExp(exp){let t=0,v=0;Object.values(exp||{}).forEach(et=>Object.values(et).forEach(x=>{t++;if(x.realizada)v++;}));return t?Math.round((v/t)*100):0;}
function expCount(exp){let t=0,v=0;Object.values(exp||{}).forEach(et=>Object.values(et).forEach(x=>{t++;if(x.realizada)v++;}));return{v,t};}
function ini(n){return n.split(" ").slice(0,2).map(w=>w[0]).join("").toUpperCase();}
const AVC=[[C.v100,C.v700],["#e8f4e8",C.v800],[C.acL,"#8a5a00"],[C.azB,C.az],["#f0ebe8","#7a3520"],["#eee8f4","#4a2070"]];
function avc(id){let h=0;for(let i=0;i<id.length;i++)h=id.charCodeAt(i)+((h<<5)-h);return AVC[Math.abs(h)%AVC.length];}

function mkEd(id,nombre,opts={}){
  const habNivel=opts.habNivel||"";

}

const buildExpViejoFrom=(evs)=>{const e=initExpViejo();const VM={miembro_activo:{"Derechos Asociativos":"Derechos Asociativos"},ayudante_unidad:{"Formación Scout":"Formación Scout","Rol del Educador":"Rol del Educador","Programa de Jóvenes 1":"Programa de Jóvenes 1","Programa de Jóvenes 2":"Programa de Jóvenes 2","Planificación, desarrollo y evaluación de actividades al aire libre":"Planificación, desarrollo y evaluación de actividades al aire libre","Responsabilidades del Educador":"Responsabilidades del Educador","Toma de decisiones y resol. de conflicto":"Toma de decisiones y resolución de conflicto","Primero Auxilios":"Primeros Auxilios","Educador y su Fe 1":"Educador y su Fe 1","Clima Educativo":"Clima Educativo"},jefe_unidad:{"Involucramiento Comunitario":"Involucramiento Comunitario","Acompañamiento":"Acompañamiento","Liderazgo multiplicador":"Liderazgo multiplicador","Gestión Institucional":"Gestión Institucional","Educador y su Fe 2":"Educador y su Fe 2","Herrameintas para la gestión del grupo scout":"Herramientas para la gestión del grupo scout"},jefe_grupo:{"Captación y gestión de adultos":"Captación y gestión de adultos","Gestión de SAAC":"Gestión de SAAC","Relaciones Institucionales":"Relaciones Institucionales"}};(evs||[]).forEach(({etapa,nombre,fecha,realizada})=>{const m=VM[etapa]?.[nombre];if(m&&e[etapa]?.[m]!==undefined)e[etapa][m]={realizada:!!realizada,fecha:fecha||""};});return e;};

function seedEd(id,nombre,opts={}){
  const ed=mkEd(id,nombre,opts);
  ed.experiencias=buildExpFrom(opts.exps||[]);
  ed.expViejo=buildExpViejoFrom(opts.expsViejo||[]);
  return ed;
}

// ─── GITHUB API ───────────────────────────────────────────────────────
let _ghSha = null;

function toBase64(str){
  return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g,(_,p)=>String.fromCharCode('0x'+p)));
}
function fromBase64(b64){
  return decodeURIComponent(atob(b64).split('').map(c=>'%'+('00'+c.charCodeAt(0).toString(16)).slice(-2)).join(''));
}

async function ghGetSha(){
  const r=await fetch(GH_API+"?t="+Date.now(),{headers:{"Authorization":"token "+getToken(),"Accept":"application/vnd.github.v3+json"}});
  if(!r.ok) throw new Error("gh_get_fail: "+r.status);
  const j=await r.json();
  _ghSha=j.sha;
  return j;
}

async function ghLoad(){
  const j=await ghGetSha();
  return JSON.parse(fromBase64(j.content.replace(/\n/g,"")));
}

async function ghSave(data){
  try{ await ghGetSha(); }catch(e){ console.warn("SHA refresh fail:",e); }
  if(!_ghSha) throw new Error("SHA no disponible");
  const content=toBase64(JSON.stringify(data,null,0));
  const body={message:"Actualizacion "+new Date().toISOString(),content,sha:_ghSha};
  const res=await fetch(GH_API,{method:"PUT",headers:{"Authorization":"token "+getToken(),"Accept":"application/vnd.github.v3+json","Content-Type":"application/json"},body:JSON.stringify(body)});
  if(!res.ok){const e=await res.text();throw new Error("gh_save_fail: "+e);}
  const j=await res.json();
  _ghSha=j.content.sha;
  return true;
}

  const loadData=async()=>{
    if(!getToken()){setNeedToken(true);setStatus("error");return;}
    setStatus("loading");setNeedToken(false);
    try{
      const data=await ghLoad();

        setEds(data.educadores.map(ed=>({...ed,expViejo:ed.expViejo||initExpViejo(),habNivel:ed.habNivel||"",nivelacion:ed.nivelacion||""})));

      setStatus("error");
      if(!eds) setEds(SEED);
    }

  useEffect(()=>{ loadData(); },[]);

  const handleTokenSave=async()=>{

        </div>
      </div>
    </div>
  );

  const persist=useCallback((newEds)=>{
    setEds(newEds);setStatus("saving");
    if(timerRef.current)clearTimeout(timerRef.current);

        {ed.nivelacion&&<div style={{marginBottom:8,padding:"3px 9px",background:"#fff3cd",border:"1px solid #ffc107",borderRadius:6,fontSize:11,color:"#664d03",fontWeight:500}}>⚠ Nivelación activa</div>}
        <div style={{marginBottom:6}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.gl,marginBottom:3}}><span style={{fontWeight:600,color:C.v600}}>Competencias</span><span>{pc}%</span></div>
          <div className="pb"><div className="pf" style={{width:`${pc}%`,background:pc===100?C.v500:pc>50?C.v400:C.ac}}/></div>
        </div>
        <div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:C.gl,marginBottom:3}}><span style={{fontWeight:600,color:"#1a5276"}}>Experiencias</span><span>{ev}/{et}</span></div>
          <div style={{height:5,borderRadius:3,background:"#d0e4f0",overflow:"hidden"}}><div style={{height:"100%",width:`${pe}%`,background:pe===100?C.v500:"#6db3d4",borderRadius:3,transition:"width .4s"}}/></div>
        </div>
        <div style={{textAlign:"right",fontSize:10,color:C.gl,marginTop:5}}>{ed.fechaIngreso?`Desde ${ed.fechaIngreso}`:""}</div>
      </div>
      <button onClick={e=>{e.stopPropagation();onDel();}} style={{position:"absolute",top:10,right:10,background:"transparent",border:"none",cursor:"pointer",fontSize:14,color:C.gl,padding:4}} title="Eliminar">✕</button>
    </div>
  );
}

function EdView({ed:ep,onBack,onSave}){
  const [ed,setEd]=useState(ep);
  const [tab,setTab]=useState("comp");
  const [nv,setNv]=useState(()=>{const n=nivelOk(ep.progress);return n===3?3:n+1||1;});
  const [open,setOpen]=useState(null);
  const [dirty,setDirty]=useState(false);
  const [saved,setSaved]=useState(false);
  const [editHab,setEditHab]=useState(false);
  useEffect(()=>{setEd(ep);},[ep]);

  const upd=(path,val)=>{
    setEd(prev=>{const next=JSON.parse(JSON.stringify(prev));let cur=next;const parts=path.split(".");parts.slice(0,-1).forEach(p=>{if(cur[p]===undefined)cur[p]={};cur=cur[p];});cur[parts[parts.length-1]]=val;return next;});setDirty(true);
  };
  const updHabNivel=nv=>{
    setEd(prev=>{const next=JSON.parse(JSON.stringify(prev));const era=NIVELA_N1_N2.includes(prev.habNivel),sera=NIVELA_N1_N2.includes(nv);next.habNivel=nv;if(!era&&sera)next.progress=aplicarNivelacion(next.progress);if(era&&!sera)next.progress=revertirNivelacion(next.progress);return next;});setDirty(true);
  };
  const saveNow=()=>{onSave(ed);setSaved(true);setDirty(false);setTimeout(()=>setSaved(false),2500);};
  const nivel=nivelOk(ed.progress),pc=pct(ed.progress),pe=pctExp(ed.experiencias);
  const{v:ev,t:et}=expCount(ed.experiencias);
  const [bg,fg]=avc(ed.id);
  const TABS=[{id:"comp",l:"Competencias"},{id:"exp",l:"Nuevo esquema"},{id:"expViejo",l:"Esquema anterior"},{id:"hab",l:"Nivelación"},{id:"notas",l:"Notas"}];

  return(
    <div style={{padding:"1.25rem"}} className="fi">
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:"1.25rem"}}>
        <button className="sb" onClick={onBack}>← Volver</button>
      </div>
      <div className="sc" style={{marginBottom:"1.25rem",borderColor:C.v300,background:`linear-gradient(135deg,${C.v50} 0%,white 100%)`}}>
        <div style={{display:"flex",alignItems:"flex-start",gap:14,flexWrap:"wrap"}}>
          <div style={{width:54,height:54,borderRadius:"50%",background:bg,color:fg,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:18,flexShrink:0,border:`2.5px solid ${C.v300}`}}>{ini(ed.nombre)}</div>
          <div style={{flex:1}}>
            <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:4,flexWrap:"wrap"}}>
              <h2 style={{fontSize:18,fontWeight:800,margin:0,color:C.v900}}>{ed.nombre}</h2>
              <span style={{fontSize:12,color:C.gl}}>Asesor US: Matías Porral</span>
            </div>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:6}}>
              <span style={bdg(C.v700,C.v100,C.v300)}>{nivel===0?"Sin nivel completado":`Nivel ${nivel} completo`}</span>
              {RECON.filter(r=>r.nivel<=nivel).map(r=><span key={r.nivel} style={bdg("#7a5000",C.acL,C.acB)}>{r.icon} {r.nombre}</span>)}
              {NIVELA_N1_N2.includes(ed.habNivel)&&<span style={bdg("#664d03","#fff3cd","#ffc107")}>⚠ Nivelado</span>}
            </div>
            {ed.hab&&<div style={{marginBottom:4}}><span style={bdg("#7a5000",C.acL,C.acB)}>🏅 {ed.hab}{ed.habNivel?" — "+HAB_NIVELES.find(h=>h.id===ed.habNivel)?.label:""}</span></div>}
            {ed.nivelacion&&<div style={{marginTop:6,padding:"6px 10px",background:"#fff3cd",border:"1px solid #ffc107",borderRadius:8,fontSize:12,color:"#664d03",lineHeight:1.5}}><b>⚠ </b>{ed.nivelacion}</div>}
          </div>
          <div style={{textAlign:"right",flexShrink:0,minWidth:90}}>
            <div style={{marginBottom:8}}>
              <p style={{fontSize:10,color:C.v600,margin:"0 0 2px",fontWeight:700,textTransform:"uppercase"}}>Competencias</p>
              <p style={{fontSize:22,fontWeight:800,margin:"0 0 2px",color:C.v700}}>{pc}%</p>
              <div className="pb" style={{width:80}}><div className="pf" style={{width:`${pc}%`,background:C.v400}}/></div>
            </div>
            <div>
              <p style={{fontSize:10,color:"#1a5276",margin:"0 0 2px",fontWeight:700,textTransform:"uppercase"}}>Experiencias</p>
              <p style={{fontSize:18,fontWeight:800,margin:"0 0 2px",color:"#1a5276"}}>{ev}/{et}</p>
              <div style={{height:4,borderRadius:2,background:"#d0e4f0",width:80,overflow:"hidden"}}><div style={{height:"100%",width:`${pe}%`,background:"#6db3d4"}}/></div>
            </div>
          </div>
        </div>
      </div>

      <div style={{display:"flex",borderBottom:`2px solid ${C.v100}`,marginBottom:"1.25rem",overflowX:"auto"}}>
        {TABS.map(t=><button key={t.id} className={`tab${tab===t.id?" on":""}`} onClick={()=>setTab(t.id)} style={{whiteSpace:"nowrap"}}>{t.l}</button>)}
      </div>

      {tab==="comp"     && <CompTab     ed={ed} nv={nv} setNv={setNv} open={open} setOpen={setOpen} upd={upd}/>}
      {tab==="exp"      && <ExpTab      ed={ed} upd={upd} exps={EXPS} campo="experiencias" etapas={[{k:"basica",l:"Etapa básica",color:C.v700,bg:C.v100},{k:"intermedia",l:"Etapa intermedia",color:C.az,bg:C.azB},{k:"avanzada",l:"Etapa avanzada",color:"#8a5a00",bg:C.acL}]}/>}
      {tab==="expViejo" && <ExpTab      ed={ed} upd={upd} exps={EXPS_VIEJO} campo="expViejo" nota="Registrá aquí las experiencias del viejo esquema de formación. Sirven como referencia para evaluar equivalencias y procesos de nivelación." etapas={[{k:"miembro_activo",l:"Miembro Activo",color:"#4a4a42",bg:"#f1efea"},{k:"ayudante_unidad",l:"Ayudante de Unidad",color:C.v700,bg:C.v100},{k:"jefe_unidad",l:"Jefe/a de Unidad",color:C.az,bg:C.azB},{k:"jefe_grupo",l:"Jefe/a de Grupo",color:"#8a5a00",bg:C.acL}]}/>}
      {tab==="hab"      && <HabTab      ed={ed} upd={upd} updHabNivel={updHabNivel} editHab={editHab} setEditHab={setEditHab}/>}
      {tab==="notas"    && <div><p style={{fontSize:12,color:C.v600,marginBottom:8,fontWeight:600}}>Notas del proceso formativo</p><textarea className="si" rows={10} value={ed.notas||""} onChange={e=>{setEd({...ed,notas:e.target.value});setDirty(true);}} placeholder="Observaciones, acuerdos, próximos pasos…"/></div>}

      <div style={{marginTop:"1.5rem",display:"flex",gap:10,alignItems:"center"}}>
        <button className="sb sbp" onClick={saveNow} disabled={!dirty}>Guardar cambios</button>
        {saved&&<span style={{fontSize:13,color:C.v600,fontWeight:600}}>✓ Guardado — sincronizando con GitHub…</span>}
      </div>
    </div>
  );
}

function HabTab({ed,upd,updHabNivel,editHab,setEditHab}){
  return(
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {ed.nivelacion&&<div style={{padding:"10px 14px",background:"#fff3cd",border:"1px solid #ffc107",borderRadius:10,fontSize:13,color:"#664d03",lineHeight:1.65}}><p style={{fontWeight:700,margin:"0 0 4px",fontSize:12,textTransform:"uppercase"}}>⚠ Proceso de nivelación</p><p style={{margin:0}}>{ed.nivelacion}</p></div>}
      <div className="sc" style={{borderColor:C.acB,background:C.acL}}>
        <p style={{fontSize:12,fontWeight:700,color:"#8a5a00",margin:"0 0 10px",textTransform:"uppercase"}}>🏅 Habilitación del sistema anterior</p>
        {ed.hab?<div>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,flexWrap:"wrap"}}>
            <span style={bdg("#7a5000",C.acL,C.acB)}>{ed.hab}</span>
            {ed.habNivel&&<span style={bdg("#7a5000",C.acL,C.acB)}>{HAB_NIVELES.find(h=>h.id===ed.habNivel)?.label}</span>}
            <button className="sb" style={{fontSize:11,padding:"2px 8px"}} onClick={()=>setEditHab(!editHab)}>✏️ Editar</button>
          </div>
          {ed.habDet&&<p style={{fontSize:12,color:"#7a5000",margin:"8px 0 0",lineHeight:1.7}}>{ed.habDet}</p>}
        </div>:<button className="sb" style={{fontSize:12}} onClick={()=>setEditHab(!editHab)}>+ Registrar habilitación previa</button>}
        {editHab&&<div style={{marginTop:12,display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
          <div><label style={{fontSize:11,color:"#8a5a00",display:"block",marginBottom:4,fontWeight:600}}>Tipo</label><select className="si" value={ed.hab||""} onChange={e=>upd("hab",e.target.value)}><option value="">Sin habilitación</option>{HABS.map(h=><option key={h}>{h}</option>)}</select></div>
          <div><label style={{fontSize:11,color:"#8a5a00",display:"block",marginBottom:4,fontWeight:600}}>Nivel alcanzado</label><select className="si" value={ed.habNivel||""} onChange={e=>updHabNivel(e.target.value)}>{HAB_NIVELES.map(h=><option key={h.id} value={h.id}>{h.label}</option>)}</select></div>
          {NIVELA_N1_N2.includes(ed.habNivel)&&<div style={{gridColumn:"1/-1",padding:"6px 10px",background:"#fff3cd",border:"1px solid #ffc107",borderRadius:8,fontSize:12,color:"#664d03"}}>⚠ Nivel Jefe/a de Unidad o superior → N1 y N2 marcados como validados por nivelación.</div>}
          <div style={{gridColumn:"1/-1"}}><label style={{fontSize:11,color:"#8a5a00",display:"block",marginBottom:4,fontWeight:600}}>Nota de nivelación</label><textarea className="si" rows={3} value={ed.nivelacion||""} onChange={e=>upd("nivelacion",e.target.value)} placeholder="Qué experiencias del nuevo esquema le corresponde hacer…"/></div>
        </div>}
      </div>
      <p style={{fontSize:12,color:C.gl,fontStyle:"italic"}}>Al asignar Jefe/a de Unidad o superior, el sistema aplica automáticamente la nivelación validando N1 y N2.</p>
    </div>
  );
}

function CompTab({ed,nv,setNv,open,setOpen,upd}){
  const cN=n=>{let v=0,t=0;TODAS.forEach(c=>{t++;if(ed.progress?.[c.id]?.[n]?.estado==="Validado")v++;});return{v,t};};
  return(
    <div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:8,marginBottom:"1.25rem"}}>
        {[{n:1,l:"Nivel 1 — Básico",s:"Etapa básica"},{n:2,l:"Nivel 2 — Intermedio",s:"Etapa intermedia"},{n:3,l:"Nivel 3 — Avanzado",s:"Etapa avanzada"}].map(({n,l,s})=>{
          const{v,t}=cN(n);const act=nv===n,comp=v===t;
          return<button key={n} onClick={()=>setNv(n)} style={{padding:"10px 8px",border:`2px solid ${act?C.v600:comp?C.v400:C.v200}`,borderRadius:10,background:act?C.v600:comp?C.v50:"white",cursor:"pointer",textAlign:"left",transition:"all .15s",outline:"none"}}>
            <p style={{fontSize:12,fontWeight:700,margin:"0 0 1px",color:act?"white":C.v800}}>{l}{comp&&!act?" ✓":""}</p>
            <p style={{fontSize:11,margin:"0 0 6px",color:act?C.v200:C.gl}}>{s}</p>
            <div style={{height:3,borderRadius:2,background:act?"rgba(255,255,255,.25)":C.v100,overflow:"hidden"}}><div style={{height:"100%",width:`${Math.round((v/t)*100)}%`,background:act?C.ac:C.v400}}/></div>
            <p style={{fontSize:11,margin:"4px 0 0",color:act?C.v200:C.gl}}>{v}/{t} validadas</p>
          </button>;
        })}
      </div>
      {[["esenciales",COMP_ESE],["especificas",COMP_ESP]].map(([tipo,comps])=>(
        <div key={tipo} style={{marginBottom:"1.5rem"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10}}>
            <div style={{height:2,width:18,background:tipo==="esenciales"?C.v600:C.ac,borderRadius:1}}/>
            <p style={{fontSize:11,fontWeight:700,color:tipo==="esenciales"?C.v700:"#8a5a00",textTransform:"uppercase",letterSpacing:".06em",margin:0}}>{tipo==="esenciales"?"Competencias esenciales":"Competencias específicas"}</p>
          </div>
          {comps.map(c=><CRow key={c.id} c={c} nv={nv} data={ed.progress?.[c.id]?.[nv]||{estado:"Sin iniciar",fecha:"",comentario:""}} isOpen={open===`${c.id}-${nv}`} onTog={()=>setOpen(open===`${c.id}-${nv}`?null:`${c.id}-${nv}`)} upd={(f,v)=>upd(`progress.${c.id}.${nv}.${f}`,v)}/>)}
        </div>
      ))}
    </div>
  );
}

function CRow({c,nv,data,isOpen,onTog,upd}){
  const es=ES[data.estado];const r=RUTA[c.id];
  const esNiv=data.comentario==="Validado por nivelación (esquema anterior)";
  return(
    <div className="crow" style={{borderColor:isOpen?C.v400:data.estado==="Validado"?C.v300:C.v200}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"11px 14px",cursor:"pointer"}} onClick={onTog}>
        <div style={{flex:1}}>
          <p style={{fontSize:14,fontWeight:600,margin:"0 0 2px",color:C.v900}}>{c.n}</p>
          {data.fecha&&<p style={{fontSize:11,color:C.gl,margin:0}}>{esNiv?"Nivelación":"Actualizado"}: {data.fecha}</p>}
        </div>
        <div style={{display:"flex",gap:6,alignItems:"center"}}>
          {esNiv&&<span style={bdg("#664d03","#fff3cd","#ffc107")}>nivelado</span>}
          <span style={bdg(es.color,es.bg,es.border)}>{data.estado}</span>
        </div>
        <span style={{fontSize:12,color:C.v500,marginLeft:4,flexShrink:0}}>{isOpen?"▲":"▼"}</span>
      </div>
      {isOpen&&(
        <div style={{borderTop:`1px solid ${C.v100}`,padding:"12px 14px",background:C.v50}} className="fi">
          {r?.[`n${nv}`]&&<div style={{background:C.v100,border:`1px solid ${C.v200}`,borderRadius:8,padding:"10px 12px",marginBottom:12}}>
            <p style={{fontSize:11,fontWeight:700,color:C.v700,margin:"0 0 5px",textTransform:"uppercase"}}>📋 Propuesta de aprendizaje — Nivel {nv}</p>
            <p style={{fontSize:13,color:C.v900,margin:0,lineHeight:1.65}}>{r[`n${nv}`]}</p>
            {r.r1&&<div style={{marginTop:8,paddingTop:8,borderTop:`1px solid ${C.v200}`}}><p style={{fontSize:11,fontWeight:700,color:C.v600,margin:"0 0 2px"}}>Resultado esperado</p><p style={{fontSize:12,color:C.gt,margin:0,fontStyle:"italic"}}>{r.r1}</p></div>}
          </div>}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
            <div><label style={{fontSize:11,color:C.v700,display:"block",marginBottom:4,fontWeight:600}}>Estado</label><select className="si" value={data.estado} onChange={e=>upd("estado",e.target.value)}>{ESTADOS.map(s=><option key={s}>{s}</option>)}</select></div>
            <div><label style={{fontSize:11,color:C.v700,display:"block",marginBottom:4,fontWeight:600}}>Fecha</label><input type="date" className="si" value={data.fecha} onChange={e=>upd("fecha",e.target.value)}/></div>
          </div>
          <div><label style={{fontSize:11,color:C.v700,display:"block",marginBottom:4,fontWeight:600}}>Comentario</label><textarea className="si" rows={2} value={data.comentario} onChange={e=>upd("comentario",e.target.value)} placeholder="Acuerdos, próximos pasos…"/></div>
        </div>
      )}
    </div>
  );
}

function ExpTab({ed,upd,exps,campo,etapas,nota}){
  return(
    <div style={{display:"flex",flexDirection:"column",gap:"1.5rem"}}>
      {nota&&<div style={{padding:"8px 12px",background:"#f1efea",border:"1px solid #d0d0c8",borderRadius:8,fontSize:12,color:C.gt}}>{nota}</div>}
      {etapas.map(({k,l,color,bg})=>{
        const arr=exps[k];const done=arr.filter(x=>ed[campo]?.[k]?.[x]?.realizada).length;
        return<div key={k}>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
            <div style={{display:"inline-flex",alignItems:"center",background:bg,color,padding:"4px 12px",borderRadius:20,fontSize:12,fontWeight:700,border:`1px solid ${color}40`}}>{l}</div>
            <span style={{fontSize:12,color:C.gl}}>{done}/{arr.length} realizadas</span>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {arr.map(exp=>{
              const d=ed[campo]?.[k]?.[exp]||{realizada:false,fecha:""};
              return<div key={exp} style={{background:"white",border:`1.5px solid ${d.realizada?C.v300:C.v200}`,borderRadius:8,padding:"10px 14px",display:"flex",alignItems:"center",gap:12}}>
                <input type="checkbox" checked={!!d.realizada} onChange={e=>upd(`${campo}.${k}.${exp}.realizada`,e.target.checked)} style={{width:16,height:16,accentColor:C.v600,flexShrink:0,cursor:"pointer"}}/>
                <span style={{flex:1,fontSize:13,color:d.realizada?C.v800:C.gt,fontWeight:d.realizada?600:400}}>{exp}</span>
                <input type="date" className="si" value={d.fecha||""} style={{width:140,fontSize:12}} onChange={e=>upd(`${campo}.${k}.${exp}.fecha`,e.target.value)}/>
              </div>;
            })}
          </div>
        </div>;
      })}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
